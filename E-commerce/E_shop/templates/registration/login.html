{% extends 'base.html' %}
{% block body %}

<section id="form" style="margin-left:30%"><!--form-->
		<div class="container">
			<div class="col-sm-4 col-sm-offset-1">
                <div class="Signup-form"><!--Signup form-->
						<h2>Login to your account</h2>
                        <form method="POST">
						
                            {% csrf_token %}
                            {% for field in form %}
                            {{ field.errors }}
                            <label>{{field.label_tag}}</label>
                            <p> {{field}}</p>
                            {% endfor %}
                         <a href="#" style="float:right; ">Forget Password?</a> <br>
							<button class="btn btn - default" type="Submit">Login</button>
                            <a href="{% url 'signup %}"><span>Create your account &nbsp; &rarr;</span></a>
						</form>
					</div><!--/Signup form-->

			</div>
		</div>
	</section><!--/form-->









{% endblock %}
